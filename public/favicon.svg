<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- MIKAEL Solutions — 검 엠블럼 파비콘 -->

  <!-- 배경 -->
  <rect width="512" height="512" rx="80" fill="#000000"/>

  <!-- 외원 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- 내원 -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- 검 날 (세로) -->
  <line x1="256" y1="52" x2="256" y2="370" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>

  <!-- 크로스가드 (가로) -->
  <line x1="176" y1="254" x2="336" y2="254" stroke="rgba(255,255,255,0.7)" stroke-width="12" stroke-linecap="round"/>

  <!-- 검 끝 다이아몬드 -->
  <polygon points="256,30 268,58 256,80 244,58" fill="#FFFFFF" opacity="0.95"/>

  <!-- 포멜 (손잡이 끝) -->
  <circle cx="256" cy="395" r="22" fill="rgba(255,255,255,0.5)"/>
  <circle cx="256" cy="395" r="14" fill="rgba(255,255,255,0.3)"/>

  <!-- MIKAEL 텍스트 -->
  <text x="256" y="475" text-anchor="middle" font-family="serif" font-size="42"
        fill="rgba(255,255,255,0.5)" letter-spacing="14" font-weight="700">MIKAEL</text>
</svg>
