name: mikael-solutions

services:
  mikael-solutions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mikael-solutions
    ports:
      - "${MIKAEL_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
